<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CC Proxy</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>CC Proxy</h1>
        <nav>
            <a href="#" data-view="inspector" class="active">Inspector</a>
            <a href="#" data-view="conversation">Conversation</a>
            <a href="#" data-view="mcp">MCP Observer</a>
            <a href="#" data-view="hooks">Hooks</a>
        </nav>
        <div class="status-bar">
            <span id="connection-status" class="disconnected">Disconnected</span>
            <span id="request-count">0 requests</span>
            <span id="capture-status"></span>
        </div>
    </header>

    <main>
        <!-- Inspector View -->
        <section id="view-inspector" class="view active">
            <div class="toolbar">
                <button id="btn-toggle-capture">Dump Raw</button>
                <button id="btn-delete-selected" class="hidden" style="background:var(--error)">Delete Selected (<span id="selected-count">0</span>)</button>
                <span class="sep">|</span>
                <label>Upstream:</label>
                <select id="upstream-select"></select>
                <button id="btn-upstream-add" title="Add">+</button>
                <button id="btn-upstream-edit" title="Edit">&#9998;</button>
                <button id="btn-upstream-delete" title="Delete" disabled>&#10005;</button>
                <span id="upstream-url-display" class="upstream-url"></span>
            </div>
            <div id="upstream-edit-form" class="inline-edit hidden">
                <input type="text" id="upstream-edit-name" placeholder="Name" size="12">
                <input type="text" id="upstream-edit-url" placeholder="https://..." size="36">
                <input type="password" id="upstream-edit-token" placeholder="Token (optional)" size="22">
                <br>
                <label class="model-map-label">Model Map:</label>
                <textarea id="upstream-edit-modelmap" placeholder="claude-sonnet-4-6 = deepseek-v4-pro&#10;claude-opus-4-6 = deepseek-v4-pro[1m]&#10;claude-haiku-4-5 = deepseek-chat" rows="3" cols="52" spellcheck="false"></textarea>
                <br>
                <button id="btn-upstream-save">Save</button>
                <button id="btn-upstream-cancel">Cancel</button>
            </div>
            <div class="toolbar filter-row">
                <label>Session:</label>
                <select id="filter-session">
                    <option value="">All Sessions</option>
                </select>
                <button id="btn-session-export" class="hidden">Export ▾</button>
                <button id="btn-session-rename" class="hidden">Rename</button>
                <button id="btn-session-delete" class="hidden btn-danger">Delete Session</button>
                <span class="sep">|</span>
                <label>Model:</label>
                <select id="filter-model">
                    <option value="">All Models</option>
                </select>
                <label>From:</label>
                <input type="datetime-local" id="filter-time-from" step="1">
                <label>To:</label>
                <input type="datetime-local" id="filter-time-to" step="1">
            </div>
            <div class="table-container">
                <table id="requests-table">
                    <thead>
                        <tr>
                            <th class="col-chk"><input type="checkbox" id="select-all" title="Select all"></th>
                            <th>Time</th>
                            <th>Method</th>
                            <th>Path</th>
                            <th>Status</th>
                            <th>Model</th>
                            <th>Session</th>
                            <th>Tokens In</th>
                            <th>Tokens Out</th>
                            <th>Duration</th>
                            <th>TTFT</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="requests-tbody"></tbody>
                </table>
            </div>
            <div class="pagination" id="pagination">
                <span id="page-info">0 requests</span>
                <select id="page-size">
                    <option value="20">20 / page</option>
                    <option value="50" selected>50 / page</option>
                    <option value="100">100 / page</option>
                    <option value="200">200 / page</option>
                </select>
                <button id="btn-page-prev" disabled>Prev</button>
                <span id="page-num">Page 1</span>
                <button id="btn-page-next" disabled>Next</button>
            </div>
            <div id="request-detail" class="detail-panel hidden">
                <div class="detail-header">
                    <h3 id="detail-title">Request Detail</h3>
                    <button id="btn-close-detail">×</button>
                </div>
                <div class="detail-tabs">
                    <button class="tab active" data-tab="request">Request</button>
                    <button class="tab" data-tab="response">Response</button>
                    <button class="tab" data-tab="sse">SSE Events</button>
                </div>
                <div id="detail-content" class="detail-body"></div>
            </div>
        </section>

        <!-- Conversation View -->
        <section id="view-conversation" class="view">
            <div class="toolbar">
                <button id="btn-conv-clear">Clear</button>
                <select id="conv-filter">
                    <option value="all">All Messages</option>
                </select>
            </div>
            <div id="conversation-timeline" class="timeline"></div>
        </section>

        <!-- MCP Observer View -->
        <section id="view-mcp" class="view">
            <div class="toolbar">
                <label>MCP Destination:</label>
                <input type="text" id="mcp-destination" placeholder="e.g. https://gitmcp.io/user/repo" size="50">
                <button id="btn-set-mcp">Set Destination</button>
                <button id="btn-clear-mcp-view">Clear</button>
            </div>
            <div class="table-container">
                <table id="mcp-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Method</th>
                            <th>Status</th>
                            <th>Request Body</th>
                            <th>Response Body</th>
                        </tr>
                    </thead>
                    <tbody id="mcp-tbody"></tbody>
                </table>
            </div>
        </section>

        <!-- Hooks View -->
        <section id="view-hooks" class="view">
            <div class="toolbar">
                <button id="btn-clear-hooks">Clear Hooks</button>
            </div>
            <div class="table-container">
                <table id="hooks-table">
                    <thead>
                        <tr>
                            <th>Time</th>
                            <th>Event</th>
                            <th>Session</th>
                            <th>CWD</th>
                            <th>Exit Code</th>
                        </tr>
                    </thead>
                    <tbody id="hooks-tbody"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
